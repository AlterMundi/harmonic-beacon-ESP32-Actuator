<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beacon</title>
  <style>
    :root {
      --accent: #00e676;
      --bg: #121212;
      --surface: #1e1e1e;
      --surface2: #2a2a2a;
      --surface3: #333;
      --text: #e0e0e0;
      --muted: #888;
      --danger: #ff5252;
      --orange: #ff9100;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
    }
    h1 {
      color: var(--accent);
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 16px;
    }
    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .fundamental {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .fundamental input[type="range"] { flex: 1; }
    .fundamental input[type="number"] {
      width: 80px;
      background: var(--surface2);
      border: 1px solid #444;
      border-radius: 6px;
      color: var(--text);
      padding: 6px;
      text-align: center;
    }
    .mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .mode-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #444;
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .mode-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0, 230, 118, 0.1);
    }
    .tine {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .tine-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .tine-name { font-weight: 600; }
    .tine-freq {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .control-row label {
      font-size: 0.8rem;
      color: var(--muted);
      min-width: 60px;
    }
    .control-row input[type="range"] { flex: 1; }
    .control-row .value {
      width: 70px;
      background: var(--surface);
      border: 1px solid #444;
      border-radius: 6px;
      color: var(--text);
      padding: 4px 6px;
      text-align: right;
      font-size: 0.85rem;
      font-variant-numeric: tabular-nums;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .btn-play { background: var(--accent); color: #000; }
    .btn-stop { background: var(--danger); color: #fff; }
    .btn-sweep { background: var(--orange); color: #000; }
    .btn-secondary {
      background: transparent;
      border: 1px solid #555;
      color: var(--muted);
      padding: 8px 12px;
      font-size: 0.85rem;
    }
    #status {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 12px;
      min-height: 20px;
    }
    .sweep-controls {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #333;
    }
    .sweep-controls.visible { display: block; }
    .hidden { display: none !important; }

    /* Settings Modal */
    #settingsModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #settingsModal.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-box h2 {
      margin: 0 0 16px;
      font-size: 1.1em;
      color: var(--orange);
    }
    .modal-box h3 {
      margin: 20px 0 10px;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .cfg-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 12px;
    }
    .cfg-row label {
      font-size: 0.9rem;
      color: #ccc;
      flex: 1;
    }
    .cfg-row input[type="number"],
    .cfg-row input[type="text"] {
      width: 100px;
      padding: 8px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid #444;
      color: #fff;
      font-size: 0.9rem;
      text-align: right;
    }
    .cfg-row input[type="checkbox"] {
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: var(--accent);
    }
    .cfg-info {
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--surface2);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 12px;
    }
    #restartBanner {
      display: none;
      background: #7d2a00;
      color: #ffc;
      border-radius: 6px;
      padding: 10px;
      font-size: 0.85rem;
      margin-top: 12px;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .modal-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    #saveBtn { background: var(--orange); color: #fff; }
    #cancelBtn { background: var(--surface3); color: #ccc; }
  </style>
</head>
<body>
  <h1>🧲 BEACON</h1>

  <div class="card">
    <div class="card-title">
      Frecuencia Fundamental
      <button class="btn-secondary" onclick="openSettings()">⚙ Config</button>
    </div>
    <div class="fundamental">
      <input type="range" id="fundamental" min="20" max="200" value="64" step="0.1">
      <input type="number" id="fundamental-num" min="20" max="200" value="64" step="0.1">
      <span>Hz</span>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="pluck" onclick="setMode('pluck')">⚡ Pluck</button>
      <button class="mode-btn" data-mode="sustain" onclick="setMode('sustain')">〰 Sustain</button>
    </div>
    <div class="actions">
      <button class="btn btn-stop" onclick="stopAll()">⏹ STOP</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Tines</div>
    <div id="tines-container">
      <div style="text-align:center;color:var(--muted);">Cargando...</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Barrido (Sweep)</div>
    <div class="actions">
      <button class="btn btn-sweep" id="sweep-btn" onclick="toggleSweep()">🚀 Iniciar Barrido</button>
    </div>
    <div class="sweep-controls" id="sweep-panel">
      <div class="control-row">
        <label>Inicio</label>
        <input type="range" id="sweep-start" min="5" max="1000" value="10">
        <span class="value" id="sweep-start-val">10 Hz</span>
      </div>
      <div class="control-row">
        <label>Fin</label>
        <input type="range" id="sweep-end" min="5" max="4000" value="1000">
        <span class="value" id="sweep-end-val">1000 Hz</span>
      </div>
      <div class="control-row">
        <label>Tiempo</label>
        <input type="range" id="sweep-time" min="1" max="30" value="5">
        <span class="value" id="sweep-time-val">5 s</span>
      </div>
    </div>
  </div>

  <div id="status">Listo</div>
  <div style="text-align:center;margin-top:12px;">
    <a href="/wifi-setup" style="color:var(--muted);font-size:0.8rem;">⚙ Configurar WiFi</a>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal">
    <div class="modal-box">
      <h2>⚙ Configuración Avanzada</h2>
      
      <div class="cfg-info">
        <span id="s_device_name">beacon</span>
      </div>

      <h3>OSC (Open Sound Control)</h3>
      <div class="cfg-row">
        <label>Habilitado</label>
        <input type="checkbox" id="s_osc_enabled">
      </div>
      <div class="cfg-row">
        <label>Puerto <small>(requiere reinicio)</small></label>
        <input type="number" id="s_osc_port" min="1024" max="65535">
      </div>
      <div class="cfg-row">
        <label>Duty mínimo <small>(vel=0)</small></label>
        <input type="number" id="s_osc_min_duty" min="0" max="255">
      </div>
      <div class="cfg-row">
        <label>Duty máximo <small>(vel=127)</small></label>
        <input type="number" id="s_osc_max_duty" min="0" max="255">
      </div>

      <h3>Envolvente por defecto</h3>
      <div class="cfg-row">
        <label>Attack (ms)</label>
        <input type="number" id="s_attack_ms" min="0" max="5000">
      </div>
      <div class="cfg-row">
        <label>Decay (ms)</label>
        <input type="number" id="s_decay_ms" min="0" max="10000">
      </div>
      <div class="cfg-row">
        <label>Duración pulso (ms)</label>
        <input type="number" id="s_pulse_ms" min="0" max="10000">
      </div>

      <div id="restartBanner">⚠ Puerto OSC cambiado — reiniciá el dispositivo para aplicar.</div>

      <div class="modal-actions">
        <button id="cancelBtn" onclick="closeSettings()">Cancelar</button>
        <button id="saveBtn" onclick="saveSettings()">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    // Estado global
    let tines = [];
    let mode = 'pluck';
    let sweeping = false;
    let originalConfig = {};

    // Inicialización
    async function init() {
      await loadStatus();
      setupListeners();
      setInterval(loadStatus, 1000);
    }

    // Cargar estado del servidor
    async function loadStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        
        if (tines.length === 0 && data.tines) {
          tines = data.tines;
          renderTines();
        }
        
        if (data.fundamental_hz) {
          const fundSlider = document.getElementById('fundamental');
          const fundNum = document.getElementById('fundamental-num');
          if (document.activeElement !== fundSlider && document.activeElement !== fundNum) {
            fundSlider.value = data.fundamental_hz;
            fundNum.value = data.fundamental_hz;
          }
        }
      } catch (e) {
        setStatus('Error de conexión');
      }
    }

    // Renderizar controles de tines
    function renderTines() {
      const container = document.getElementById('tines-container');
      container.innerHTML = '';

      tines.forEach((t, i) => {
        const div = document.createElement('div');
        div.className = 'tine';
        div.innerHTML = `
          <div class="tine-header">
            <span class="tine-name">${t.name}</span>
            <span class="tine-freq" id="freq-${i}">${t.freq.toFixed(1)} Hz</span>
          </div>
          <div class="control-row">
            <label>Freq</label>
            <input type="range" id="hz-${i}" min="20" max="2000" value="${t.freq}" step="0.1">
            <input type="number" class="value" id="hz-val-${i}" min="20" max="2000" step="0.1" value="${t.freq.toFixed(1)}">
          </div>
          <div class="control-row">
            <label>Power</label>
            <input type="range" id="vel-${i}" min="0" max="255" value="200">
            <input type="number" class="value" id="vel-val-${i}" min="0" max="255" value="200">
          </div>
          <div class="control-row sustain-only hidden">
            <label>Ataque</label>
            <input type="range" id="atk-${i}" min="0" max="500" value="10">
            <input type="number" class="value" id="atk-val-${i}" min="0" max="500" value="10">
          </div>
          <div class="control-row sustain-only hidden">
            <label>Duración</label>
            <input type="range" id="dur-${i}" min="0" max="5000" value="1000" step="100">
            <input type="number" class="value" id="dur-val-${i}" min="0" max="5000" step="100" value="1000">
          </div>
          <div class="actions">
            <button class="btn btn-play" onclick="playTine(${i})">▶ Tocar</button>
          </div>
        `;
        container.appendChild(div);
      });

      setupTineListeners();
      updateModeVisibility();
    }

    // Setup listeners
    function setupListeners() {
      const fund = document.getElementById('fundamental');
      const fundNum = document.getElementById('fundamental-num');

      fund.oninput = () => { fundNum.value = fund.value; };
      fund.onchange = () => updateFundamental(parseFloat(fund.value));
      fundNum.onchange = () => {
        let v = parseFloat(fundNum.value);
        v = Math.max(20, Math.min(200, v));
        fundNum.value = v;
        fund.value = v;
        updateFundamental(v);
      };

      // Sweep listeners
      document.getElementById('sweep-start').oninput = (e) => {
        document.getElementById('sweep-start-val').textContent = e.target.value + ' Hz';
      };
      document.getElementById('sweep-end').oninput = (e) => {
        document.getElementById('sweep-end-val').textContent = e.target.value + ' Hz';
      };
      document.getElementById('sweep-time').oninput = (e) => {
        document.getElementById('sweep-time-val').textContent = e.target.value + ' s';
      };
    }

    function setupTineListeners() {
      tines.forEach((t, i) => {
        const hzSlider = document.getElementById(`hz-${i}`);
        const velSlider = document.getElementById(`vel-${i}`);
        const atkSlider = document.getElementById(`atk-${i}`);
        const durSlider = document.getElementById(`dur-${i}`);

        const hzNum = document.getElementById(`hz-val-${i}`);
        const velNum = document.getElementById(`vel-val-${i}`);
        const atkNum = document.getElementById(`atk-val-${i}`);
        const durNum = document.getElementById(`dur-val-${i}`);

        if (hzSlider && hzNum) {
          hzSlider.oninput = () => { hzNum.value = parseFloat(hzSlider.value).toFixed(1); };
          hzNum.onchange = () => {
            let v = Math.max(20, Math.min(2000, parseFloat(hzNum.value) || 20));
            hzNum.value = v.toFixed(1);
            hzSlider.value = v;
          };
        }
        if (velSlider && velNum) {
          velSlider.oninput = () => { velNum.value = velSlider.value; };
          velNum.onchange = () => {
            let v = Math.max(0, Math.min(255, parseInt(velNum.value) || 0));
            velNum.value = v;
            velSlider.value = v;
          };
        }
        if (atkSlider && atkNum) {
          atkSlider.oninput = () => { atkNum.value = atkSlider.value; };
          atkNum.onchange = () => {
            let v = Math.max(0, Math.min(500, parseInt(atkNum.value) || 0));
            atkNum.value = v;
            atkSlider.value = v;
          };
        }
        if (durSlider && durNum) {
          durSlider.oninput = () => { durNum.value = parseInt(durSlider.value); };
          durNum.onchange = () => {
            let v = Math.max(0, Math.min(5000, parseInt(durNum.value) || 0));
            durNum.value = v;
            durSlider.value = v;
          };
        }
      });
    }

    function setMode(newMode) {
      mode = newMode;
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      updateModeVisibility();
    }

    function updateModeVisibility() {
      document.querySelectorAll('.sustain-only').forEach(el => {
        el.classList.toggle('hidden', mode !== 'sustain');
      });
    }

    async function updateFundamental(hz) {
      try {
        await fetch('/api/fundamental', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hz })
        });
        setTimeout(loadStatus, 100);
      } catch (e) {
        setStatus('Error al actualizar fundamental');
      }
    }

    async function playTine(index) {
      const hz = parseFloat(document.getElementById(`hz-${index}`).value);
      const vel = parseInt(document.getElementById(`vel-${index}`).value);

      const payload = {
        mode: mode,
        tines: [{ index: index, hz: hz, vel: vel }]
      };

      if (mode === 'sustain') {
        payload.tines[0].attack = parseInt(document.getElementById(`atk-${index}`).value);
        let dur = parseInt(document.getElementById(`dur-${index}`).value);
        payload.tines[0].dur = dur === 0 ? 0 : dur;
      } else {
        payload.tines[0].pulse = Math.round(5 + (vel / 255) * 55);
      }

      try {
        await fetch('/api/play', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        setStatus(`Tocando ${tines[index].name}`);
      } catch (e) {
        setStatus('Error al tocar');
      }
    }

    async function stopAll() {
      try {
        await fetch('/api/stop', { method: 'POST' });
        setStatus('Detenido');
      } catch (e) {
        setStatus('Error al detener');
      }
    }

    function toggleSweep() {
      const panel = document.getElementById('sweep-panel');
      const btn = document.getElementById('sweep-btn');

      if (sweeping) {
        stopAll();
        sweeping = false;
        btn.textContent = '🚀 Iniciar Barrido';
        panel.classList.remove('visible');
        return;
      }

      if (!panel.classList.contains('visible')) {
        panel.classList.add('visible');
      } else {
        startSweep();
      }
    }

    async function startSweep() {
      const start = parseInt(document.getElementById('sweep-start').value);
      const end = parseInt(document.getElementById('sweep-end').value);
      const time = parseInt(document.getElementById('sweep-time').value);

      const payload = {
        duration_ms: time * 1000,
        tines: tines.map((t, i) => ({
          index: i,
          start: start * t.harmonic,
          end: end * t.harmonic
        }))
      };

      try {
        await fetch('/api/sweep', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        sweeping = true;
        document.getElementById('sweep-btn').textContent = '⏹ Detener';
        setStatus(`Barrido ${time}s`);

        setTimeout(() => {
          sweeping = false;
          document.getElementById('sweep-btn').textContent = '🚀 Iniciar Barrido';
          document.getElementById('sweep-panel').classList.remove('visible');
        }, time * 1000 + 500);
      } catch (e) {
        setStatus('Error en barrido');
      }
    }

    // ==================== SETTINGS MODAL ====================
    
    async function openSettings() {
      try {
        const res = await fetch('/api/config');
        const cfg = await res.json();
        originalConfig = JSON.parse(JSON.stringify(cfg)); // Deep copy

        document.getElementById('s_device_name').textContent = cfg.device_name || 'beacon';
        document.getElementById('s_osc_enabled').checked = cfg.osc_enabled ?? true;
        document.getElementById('s_osc_port').value = cfg.osc_port ?? 53280;
        document.getElementById('s_osc_min_duty').value = cfg.osc_min_duty ?? 120;
        document.getElementById('s_osc_max_duty').value = cfg.osc_max_duty ?? 255;
        document.getElementById('s_attack_ms').value = cfg.default_params?.attack_ms ?? 10;
        document.getElementById('s_decay_ms').value = cfg.default_params?.decay_ms ?? 200;
        document.getElementById('s_pulse_ms').value = cfg.default_params?.pulse_duration_ms ?? 500;
        
        document.getElementById('restartBanner').style.display = 'none';
        document.getElementById('saveBtn').textContent = 'Guardar';
        document.getElementById('settingsModal').classList.add('open');
      } catch (e) {
        setStatus('Error cargando configuración');
      }
    }

    function closeSettings() {
      document.getElementById('settingsModal').classList.remove('open');
    }

    async function saveSettings() {
      const portChanged = parseInt(document.getElementById('s_osc_port').value) !== (originalConfig.osc_port ?? 53280);
      
      const payload = {
        device_name: originalConfig.device_name || 'beacon',
        fundamental_hz: originalConfig.fundamental_hz || 64,
        tines: originalConfig.tines || [],
        default_params: {
          attack_ms: parseInt(document.getElementById('s_attack_ms').value),
          decay_ms: parseInt(document.getElementById('s_decay_ms').value),
          pulse_duration_ms: parseInt(document.getElementById('s_pulse_ms').value)
        },
        osc_enabled: document.getElementById('s_osc_enabled').checked,
        osc_port: parseInt(document.getElementById('s_osc_port').value),
        osc_min_duty: parseInt(document.getElementById('s_osc_min_duty').value),
        osc_max_duty: parseInt(document.getElementById('s_osc_max_duty').value)
      };

      const btn = document.getElementById('saveBtn');
      btn.textContent = 'Guardando...';

      try {
        const r = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const res = await r.json();
        
        if (res.ok) {
          btn.textContent = '✓ Guardado';
          if (portChanged) {
            document.getElementById('restartBanner').style.display = 'block';
          } else {
            setTimeout(closeSettings, 600);
          }
        } else {
          btn.textContent = 'Error';
        }
      } catch (e) {
        btn.textContent = 'Error';
      }
      
      setTimeout(() => { btn.textContent = 'Guardar'; }, 2000);
    }

    // Cerrar modal al hacer click fuera
    document.getElementById('settingsModal').addEventListener('click', (e) => {
      if (e.target.id === 'settingsModal') closeSettings();
    });

    // Status message
    let statusTimeout;
    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
      clearTimeout(statusTimeout);
      statusTimeout = setTimeout(() => {
        document.getElementById('status').textContent = 'Listo';
      }, 3000);
    }

    // Iniciar
    init();
  </script>
</body>
</html>
