<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beacon</title>
  <style>
    :root {
      --green: #00e676;
      --blue: #03a9f4;
      --red: #ff5252;
      --bg: #121212;
      --surface: #1e1e1e;
      --surface2: #2a2a2a;
      --text: #e0e0e0;
      --muted: #888;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 14px;
      background: var(--bg);
      color: var(--text);
      text-align: center;
    }

    h1 {
      color: var(--green);
      font-size: 1.4em;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .card {
      background: var(--surface);
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 0.72em;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* --- Fundamental --- */
    .hz-display {
      font-size: 2.4em;
      font-weight: bold;
      color: var(--green);
      line-height: 1;
      margin-bottom: 6px;
    }

    input[type=range] {
      width: 100%;
      accent-color: var(--green);
      margin: 6px 0 0;
    }

    /* --- Tine grid --- */
    .tine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
      gap: 8px;
    }

    .tine-btn {
      padding: 18px 6px 14px;
      font-weight: bold;
      font-size: 1.05em;
      background: var(--surface2);
      border: 2px solid var(--green);
      color: var(--green);
      border-radius: 10px;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.07s, background 0.07s, color 0.07s;
    }

    .tine-btn small {
      display: block;
      font-size: 0.62em;
      font-weight: normal;
      opacity: 0.75;
      margin-top: 5px;
    }

    .tine-btn.held,
    .tine-btn:active {
      background: var(--green);
      color: var(--bg);
      transform: scale(0.93);
    }

    /* --- Mode toggle --- */
    .mode-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #444;
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.92em;
      transition: all 0.15s;
    }

    .mode-btn.active {
      border-color: var(--green);
      color: var(--green);
      background: rgba(0, 230, 118, 0.08);
    }

    /* --- Sliders --- */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0 4px;
    }

    .slider-label {
      min-width: 72px;
      text-align: left;
      font-size: 0.85em;
      color: var(--muted);
    }

    .slider-val {
      min-width: 46px;
      text-align: right;
      font-size: 0.85em;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .slider-row input { flex: 1; margin: 0; }

    /* --- Pattern buttons --- */
    .pattern-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .pat-btn {
      padding: 14px 6px;
      border: none;
      border-radius: 10px;
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 0.95em;
      touch-action: manipulation;
      transition: background 0.1s;
    }

    .pat-btn:hover { background: #333; }
    .pat-btn:active { background: #444; }

    .stop-btn {
      grid-column: span 2;
      background: #3a1010;
      color: var(--red);
      border: 1px solid #5a1a1a;
      font-weight: bold;
      font-size: 1em;
    }

    .stop-btn:hover { background: #4a1515; }

    /* --- Status + footer --- */
    #status {
      height: 22px;
      color: var(--green);
      font-size: 0.88em;
      margin: 10px 0 8px;
    }

    .wifi-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8em;
      border-bottom: 1px dashed #444;
    }
  </style>
</head>

<body>
  <h1>🎵 BEACON</h1>

  <!-- Afinación base -->
  <div class="card">
    <div class="card-title">Afinación base</div>
    <div class="hz-display"><span id="fundVal">64.0</span> <small style="font-size:0.45em;color:var(--muted)">Hz</small></div>
    <input type="range" id="fundamental" min="20" max="400" value="64" step="0.5">
  </div>

  <!-- Tines -->
  <div class="card">
    <div class="card-title">Tines</div>
    <div id="tines" class="tine-grid">
      <button class="tine-btn">...</button>
    </div>
  </div>

  <!-- Controles de ejecución -->
  <div class="card">
    <div class="card-title">Modo</div>
    <div class="mode-row">
      <button id="modePluck" class="mode-btn active" onclick="setMode('pluck')">⚡ Pluck</button>
      <button id="modeSustain" class="mode-btn" onclick="setMode('sustain')">〰 Sustain</button>
    </div>

    <div class="slider-row">
      <span class="slider-label">Velocidad</span>
      <input type="range" id="velocity" min="1" max="255" value="150">
      <span class="slider-val" id="velVal">150</span>
    </div>

    <div id="dur-row" class="slider-row" style="display:none">
      <span class="slider-label">Duración</span>
      <input type="range" id="duration" min="50" max="3000" value="500" step="50">
      <span class="slider-val" id="durVal">500ms</span>
    </div>
  </div>

  <!-- Patrones -->
  <div class="card">
    <div class="card-title">Patrones</div>
    <div class="pattern-grid">
      <button class="pat-btn" onclick="playScale('up')">▲ Escala ↑</button>
      <button class="pat-btn" onclick="playScale('down')">▼ Escala ↓</button>
      <button class="pat-btn" onclick="playChord()">♩ Acorde</button>
      <button class="pat-btn" onclick="playLoop()">🔁 Loop</button>
      <button class="pat-btn stop-btn" onclick="stopAll()">■ STOP</button>
    </div>
  </div>

  <div id="status">Listo</div>
  <a href="/wifi-setup" class="wifi-link">⚙️ Configurar WiFi</a>

  <script>
    let mode = 'pluck';
    let tineData = [];
    let statusTimer = null;
    let loopTimer = null;

    // --- Sliders ---
    const fundSlider = document.getElementById('fundamental');
    const velSlider  = document.getElementById('velocity');
    const durSlider  = document.getElementById('duration');

    let fundDebounce;
    fundSlider.oninput = () => {
      document.getElementById('fundVal').textContent = parseFloat(fundSlider.value).toFixed(1);
      clearTimeout(fundDebounce);
      fundDebounce = setTimeout(() => {
        fetch('/setfundamental?hz=' + fundSlider.value, { method: 'POST' })
          .then(() => loadStatus()); // actualiza Hz en los botones
      }, 200);
    };

    velSlider.oninput = () => {
      document.getElementById('velVal').textContent = velSlider.value;
    };

    durSlider.oninput = () => {
      document.getElementById('durVal').textContent = durSlider.value + 'ms';
    };

    // --- Modo ---
    function setMode(m) {
      mode = m;
      document.getElementById('modePluck').classList.toggle('active', m === 'pluck');
      document.getElementById('modeSustain').classList.toggle('active', m === 'sustain');
      document.getElementById('dur-row').style.display = m === 'sustain' ? 'flex' : 'none';
    }

    // --- Status bar ---
    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => document.getElementById('status').textContent = 'Listo', 2500);
    }

    // --- Acción por tine ---
    function tinePress(i, btn) {
      const vel = parseInt(velSlider.value);
      if (mode === 'pluck') {
        // vel 1-255 → pulse 3-25 ms
        const pulse = Math.round(3 + (vel / 255) * 22);
        fetch('/pluck?tine=' + i + '&pulse=' + pulse, { method: 'POST' });
      } else {
        const dur = parseInt(durSlider.value);
        fetch('/play?tine=' + i + '&vel=' + vel + '&dur=' + dur, { method: 'POST' });
      }
      btn.classList.add('held');
      setStatus('♪ ' + (tineData[i] ? tineData[i].name + ' — ' + tineData[i].freq.toFixed(1) + ' Hz' : 'Tine ' + i));
    }

    function tineRelease(btn) {
      btn.classList.remove('held');
      // En sustain la nota sigue hasta que termine su duración; STOP para interrumpir.
    }

    // --- Construir botones de tines ---
    function buildTines(data) {
      tineData = data;
      const grid = document.getElementById('tines');
      grid.innerHTML = '';
      data.forEach((t, i) => {
        const btn = document.createElement('button');
        btn.className = 'tine-btn';
        btn.innerHTML = `<strong>${t.name}</strong><small>${t.freq.toFixed(1)} Hz</small>`;
        // Touch (mobile)
        btn.addEventListener('touchstart', e => { e.preventDefault(); tinePress(i, btn); }, { passive: false });
        btn.addEventListener('touchend',   e => { e.preventDefault(); tineRelease(btn); });
        // Mouse (desktop)
        btn.addEventListener('mousedown', () => tinePress(i, btn));
        btn.addEventListener('mouseup',   () => tineRelease(btn));
        btn.addEventListener('mouseleave',() => tineRelease(btn));
        grid.appendChild(btn);
      });
    }

    // --- Cargar estado inicial ---
    function loadStatus() {
      fetch('/status')
        .then(r => r.json())
        .then(data => {
          fundSlider.value = data.fundamental_hz;
          document.getElementById('fundVal').textContent = data.fundamental_hz.toFixed(1);
          if (data.tines && data.tines.length > 0) buildTines(data.tines);
        })
        .catch(() => {
          document.getElementById('tines').innerHTML =
            '<p style="color:var(--red);grid-column:1/-1">Sin conexión con el beacon</p>';
        });
    }

    // --- Patrones ---
    async function playScale(dir) {
      stopLoop();
      const vel   = parseInt(velSlider.value);
      const pulse = Math.round(3 + (vel / 255) * 22);
      const n     = tineData.length;
      const order = dir === 'up'
        ? [...Array(n).keys()]
        : [...Array(n).keys()].reverse();
      setStatus(dir === 'up' ? '▲ Escala ascendente' : '▼ Escala descendente');
      for (const i of order) {
        await fetch('/pluck?tine=' + i + '&pulse=' + pulse, { method: 'POST' });
        await new Promise(r => setTimeout(r, 220));
      }
    }

    async function playChord() {
      stopLoop();
      const vel = parseInt(velSlider.value);
      const dur = parseInt(durSlider.value);
      setStatus('♩ Acorde');
      await Promise.all(
        tineData.map((_, i) =>
          fetch('/play?tine=' + i + '&vel=' + vel + '&dur=' + dur, { method: 'POST' })
        )
      );
    }

    function playLoop() {
      if (loopTimer) { stopLoop(); return; }
      setStatus('🔁 Loop activo — toca de nuevo para detener');
      // Loop de escala ascendente-descendente continuo
      const vel   = parseInt(velSlider.value);
      const pulse = Math.round(3 + (vel / 255) * 22);
      const n     = tineData.length;
      let step    = 0;
      const totalSteps = n * 2 - 2; // up + down sin repetir extremos
      function tick() {
        const idx = step < n ? step : totalSteps - step;
        fetch('/pluck?tine=' + idx + '&pulse=' + pulse, { method: 'POST' });
        step = (step + 1) % totalSteps;
        loopTimer = setTimeout(tick, 220);
      }
      tick();
    }

    function stopLoop() {
      if (loopTimer) { clearTimeout(loopTimer); loopTimer = null; }
    }

    function stopAll() {
      stopLoop();
      fetch('/stop', { method: 'POST' });
      setStatus('■ Stop');
    }

    // Iniciar
    loadStatus();
  </script>
</body>

</html>
